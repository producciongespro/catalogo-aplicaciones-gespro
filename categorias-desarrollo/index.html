<!doctype html>
<html lang="es" data-bs-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Categorías de aplicativos</title>

    <!-- Bootstrap CSS (CDN) -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- CSS personalizado -->
    <link rel="stylesheet" href="./master.css" />
  </head>

  <body>
    <header class="app-header">
      <div
        class="container py-4 d-flex justify-content-between align-items-center"
      >
        <div>
          <h1 class="h3 m-0">Catálogo Solicitudes Desarrollo GESPRO</h1>
          <p class="text-muted m-0 mt-1">
            Categorías y subcategorías para formularios de
            solicitud.
          </p>
        </div>

        <button id="themeToggle" class="btn btn-outline-secondary btn-sm">
          🌙 Modo oscuro
        </button>
      </div>
    </header>

    <main class="container my-4">
      <!-- Estado: cargando -->
      <div id="loading" class="card p-4">
        <div class="d-flex align-items-center gap-3">
          <div class="spinner-border" role="status" aria-label="Cargando"></div>
          <div>
            <div class="fw-semibold">Cargando categorías…</div>
            <div class="text-muted small">
              Leyendo datos desde <code>datos/categorias.json</code>
            </div>
          </div>
        </div>
      </div>

      <!-- Estado: error -->
      <div id="error" class="alert alert-danger d-none" role="alert">
        <div class="fw-semibold">No se pudieron cargar las categorías.</div>
        <div class="small mt-1" id="errorMsg"></div>
      </div>

      <!-- Contenedor del acordeón -->
      <div id="accordionWrap" class="d-none">
        <div
          class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3"
        >
          <h2 class="h5 m-0">Categorías</h2>

          <div class="d-flex gap-2">
            <button
              id="btnExpandAll"
              class="btn btn-outline-secondary btn-sm"
              type="button"
            >
              Expandir todo
            </button>
            <button
              id="btnCollapseAll"
              class="btn btn-outline-secondary btn-sm"
              type="button"
            >
              Contraer todo
            </button>
          </div>
        </div>

        <div class="accordion" id="categoriasAccordion"></div>
      </div>
    </main>

    <footer class="container pb-4 text-end">
      <div class="text-muted small">
        Área desarollo - DRTE - GESPRO 2026
      </div>
    </footer>

    <!-- Bootstrap JS (CDN) -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      defer
    ></script>

    <!-- App JS -->
    <script src="./main.js" defer></script>
  </body>
</html>
